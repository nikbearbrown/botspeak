<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
  </marker>
</defs>
<rect x="0" y="0" width="700" height="460" fill="#fdfcfb"/>
<rect x="60" y="56" width="580" height="348" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="76" y="76" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#4a4540" letter-spacing="1.5">SPECIFICATION TEMPLATE — RURAL BROADBAND SUMMARY</text>
<line x1="76" y1="84" x2="624" y2="84" stroke="#8a8480" stroke-width="0.75"/>
<text x="76" y="94" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" fill="#4a4540" letter-spacing="1">INTENT</text>
<text x="76" y="112" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#1a1714">Give my manager a five-bullet artifact she can paste onto a slide</text>
<text x="76" y="128" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#1a1714">for tomorrow's stakeholder meeting on rural broadband subsidies.</text>
<line x1="76" y1="136" x2="624" y2="136" stroke="#c8c4c0" stroke-width="0.75" stroke-dasharray="4 3"/>
<text x="76" y="158" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" fill="#4a4540" letter-spacing="1">CONSTRAINTS</text>
<text x="76" y="176" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#1a1714">Five bullets, one clause each, ≤15 words per bullet. Source:</text>
<text x="76" y="192" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#1a1714">only claims in the attached report. Audience: has not read it.</text>
<line x1="76" y1="200" x2="624" y2="200" stroke="#c8c4c0" stroke-width="0.75" stroke-dasharray="4 3"/>
<text x="76" y="222" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" fill="#4a4540" letter-spacing="1">SUCCESS CRITERIA</text>
<text x="76" y="240" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#1a1714">Manager can paste the bullets onto her deck without rewriting.</text>
<text x="76" y="256" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#1a1714">Each bullet is readable from twenty feet away.</text>
<line x1="76" y1="264" x2="624" y2="264" stroke="#c8c4c0" stroke-width="0.75" stroke-dasharray="4 3"/>
<text x="76" y="286" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" fill="#4a4540" letter-spacing="1">EXCLUSIONS</text>
<text x="76" y="304" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#1a1714">Do not editorialize. Do not pad with context. Do not include</text>
<text x="76" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#1a1714">outside-source claims even if they would strengthen the case.</text>
<line x1="76" y1="328" x2="624" y2="328" stroke="#c8c4c0" stroke-width="0.75" stroke-dasharray="4 3"/>
<text x="76" y="350" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" fill="#4a4540" letter-spacing="1">OUTPUT FORMAT</text>
<text x="76" y="368" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#1a1714">Five bullets. One clause each. ≤100 words total.</text>
<text x="76" y="384" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#1a1714">No sub-bullets. No introduction. No closing summary.</text>
<text x="350.0" y="436" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">A working artifact — the specification a fluent practitioner fills in before she opens the tool.</text>
</svg>