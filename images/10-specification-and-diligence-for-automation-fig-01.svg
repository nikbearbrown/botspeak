<svg viewBox="0 0 700 600" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
  </marker>
</defs>
<rect x="0" y="0" width="700" height="600" fill="#fdfcfb"/>
<text x="350.0" y="32" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">Augmentation specification → Automation specification</text>
<text x="350.0" y="50" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">The extra length is not bureaucracy — it is the implicit work the human would have done at the keyboard.</text>
<rect x="56" y="80" width="220" height="470" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="68" y="102" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" fill="#4a4540" letter-spacing="1.5">AUGMENTATION SPEC</text>
<line x1="68" y1="110" x2="264" y2="110" stroke="#8a8480" stroke-width="0.75"/>
<text x="68" y="136" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#1a1714">Produce a weekly competitive</text>
<text x="68" y="158" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#1a1714">intelligence brief on the three</text>
<text x="68" y="180" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#1a1714">named competitors. Cover product,</text>
<text x="68" y="202" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#1a1714">pricing, and headcount. ≤2</text>
<text x="68" y="224" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#1a1714">pages, source-cited. Use the</text>
<text x="68" y="246" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#1a1714">weekly news pull as input.</text>
<text x="68" y="268" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#1a1714">I’ll review before it ships.</text>
<text x="166.0" y="534" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">~50 words. One paragraph.</text>
<rect x="320" y="80" width="220" height="470" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="332" y="102" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" fill="#4a4540" letter-spacing="1.5">AUTOMATION SPEC</text>
<line x1="332" y1="110" x2="528" y2="110" stroke="#8a8480" stroke-width="0.75"/>
<text x="332" y="136" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714">Pre-flight checks</text>
<text x="332" y="152" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">— specified in advance —</text>
<line x1="332" y1="164" x2="528" y2="164" stroke="#c8c4c0" stroke-width="0.75" stroke-dasharray="4 3"/>
<text x="332" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714">Confidence labels</text>
<text x="332" y="216" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">— specified in advance —</text>
<line x1="332" y1="228" x2="528" y2="228" stroke="#c8c4c0" stroke-width="0.75" stroke-dasharray="4 3"/>
<text x="332" y="264" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714">Exclusions</text>
<text x="332" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">— specified in advance —</text>
<line x1="332" y1="292" x2="528" y2="292" stroke="#c8c4c0" stroke-width="0.75" stroke-dasharray="4 3"/>
<text x="332" y="328" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714">Failure-mode handling</text>
<text x="332" y="344" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">— specified in advance —</text>
<line x1="332" y1="356" x2="528" y2="356" stroke="#c8c4c0" stroke-width="0.75" stroke-dasharray="4 3"/>
<text x="332" y="400" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714">Diligence design</text>
<text x="332" y="416" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">— specified in advance —</text>
<line x1="332" y1="428" x2="528" y2="428" stroke="#c8c4c0" stroke-width="0.75" stroke-dasharray="4 3"/>
<text x="332" y="472" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714">Named accountable human</text>
<text x="332" y="488" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">— specified in advance —</text>
<line x1="332" y1="500" x2="528" y2="500" stroke="#c8c4c0" stroke-width="0.75" stroke-dasharray="4 3"/>
<text x="430.0" y="534" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">~150 words. Section-structured.</text>
<path d="M540 136 L556 140" fill="none" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/>
<text x="564" y="144" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">input-quality anticipation</text>
<path d="M540 200 L556 204" fill="none" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/>
<text x="564" y="208" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">output-quality signaling</text>
<path d="M540 264 L556 268" fill="none" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/>
<text x="564" y="272" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">model-failure prevention</text>
<path d="M540 328 L556 332" fill="none" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/>
<text x="564" y="336" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">six ambiguity types addressed</text>
<path d="M540 400 L556 404" fill="none" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/>
<text x="564" y="408" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">four failure modes addressed</text>
<path d="M540 472 L556 476" fill="none" stroke="#1a1714" stroke-width="1" marker-end="url(#arrow)"/>
<text x="564" y="480" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">accountability gap closed</text>
<line x1="166.0" y1="564" x2="430.0" y2="564" stroke="#8a8480" stroke-width="0.75" stroke-dasharray="4 3"/>
<text x="298.0" y="582" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">Roughly 3× the length, structurally — every addition does work.</text>
</svg>